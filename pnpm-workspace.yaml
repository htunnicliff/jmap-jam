# Subdirectories that contain packages
packages:
  - packages/*

# Dependencies that may be built
onlyBuiltDependencies:
  - esbuild

# Scripts needed in each individual package
requiredScripts:
  - build
  - test

# Ensure all peer dependencies are installed and correct
strictPeerDependencies: true

# Save all dependencies using exact versions
savePrefix: ""

catalog:
  "@arethetypeswrong/core": 0.18.3
  tsdown: 0.22.3
  type-fest: "5"
  typescript: 5.9.3
  vitest: 4.1.9
